name: Build EXE

on:
  push:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install PyInstaller
      run: |
        pip install pyinstaller

    - name: Build EXE
      run: |
        pyinstaller --onefile imei_print.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: imei-print
        path: dist/*
